spring:
  application:
    name: festival-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/festival_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  address: 127.0.0.1

security:
  jwt:
    secret: ZmVzdGl2YWwtYXBwLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LTAxMDE=
    expiration-ms: 86400000

app:
  upload:
    dir: uploads
    max-file-size-bytes: 5242880
