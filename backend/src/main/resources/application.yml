spring:
  application:
    name: festival-backend
  config:
    import: optional:file:./.env[.properties],optional:file:./backend/.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/festival_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  mail:
    host: ${MAIL_HOST:MAIL_HOST}
    port: ${MAIL_PORT:MAIL_PORT}
    username: ${MAIL_USERNAME:your-mailbox@yandex.ru}
    password: ${MAIL_PASSWORD:your-app-password}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:15000}
          timeout: ${MAIL_SMTP_TIMEOUT:15000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:15000}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:your-google-client-secret}
            redirect-uri: "${app.oauth2.redirect-base-url:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - email
              - profile
          yandex:
            client-id: ${YANDEX_OAUTH_CLIENT_ID:your-yandex-client-id}
            client-secret: ${YANDEX_OAUTH_CLIENT_SECRET:your-yandex-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${app.oauth2.redirect-base-url:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope:
              - login:email
              - login:info
        provider:
          yandex:
            authorization-uri: https://oauth.yandex.ru/authorize
            token-uri: https://oauth.yandex.ru/token
            user-info-uri: https://login.yandex.ru/info?format=json
            user-name-attribute: id

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  address: 127.0.0.1

security:
  jwt:
    secret: ZmVzdGl2YWwtYXBwLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LTAxMDE=
    expiration-ms: 86400000

app:
  upload:
    dir: uploads
    max-file-size-bytes: 5242880
  demo:
    kolomna-seed-enabled: ${APP_DEMO_KOLOMNA_SEED_ENABLED:true}
    ryazan-seed-enabled: ${APP_DEMO_RYAZAN_SEED_ENABLED:true}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  notifications:
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-chat-id: ${TELEGRAM_CHAT_ID:}
    email-from: ${NOTIFICATIONS_EMAIL_FROM:noreply@festival.local}

payments:
  yookassa:
    shop-id: ${YOOKASSA_SHOP_ID:your-yookassa-shop-id}
    secret-key: ${YOOKASSA_SECRET_KEY:your-yookassa-secret-key}
    api-base-url: ${YOOKASSA_API_BASE_URL:https://api.yookassa.ru/v3}

yandex:
  metrika:
    enabled: ${YANDEX_METRIKA_ENABLED:false}
    token: ${YANDEX_METRIKA_TOKEN:}
    counter-id: ${YANDEX_METRIKA_COUNTER_ID:}
