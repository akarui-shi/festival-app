spring:
  application:
    name: festival-backend
  config:
    import: optional:file:./.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/festival_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      client:
        registration:
          vk:
            client-id: ${VK_OAUTH_CLIENT_ID:54557502}
            client-secret: ${VK_OAUTH_CLIENT_SECRET:vk-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${app.oauth2.redirect-base-url:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope:
              - email
          yandex:
            client-id: ${YANDEX_OAUTH_CLIENT_ID:6955f4e06fa94614820fbb14ac8f0a83}
            client-secret: ${YANDEX_OAUTH_CLIENT_SECRET:daa0678bb505423e9fb0791cd682d0eb}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "${app.oauth2.redirect-base-url:http://localhost:8080}/login/oauth2/code/{registrationId}"
            scope:
              - login:email
              - login:info
        provider:
          vk:
            authorization-uri: https://id.vk.com/authorize
            token-uri: https://id.vk.com/oauth2/auth
            user-info-uri: https://id.vk.com/oauth2/user_info
            user-name-attribute: user_id
          yandex:
            authorization-uri: https://oauth.yandex.ru/authorize
            token-uri: https://oauth.yandex.ru/token
            user-info-uri: https://login.yandex.ru/info?format=json
            user-name-attribute: id

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  address: 127.0.0.1

security:
  jwt:
    secret: ZmVzdGl2YWwtYXBwLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LTAxMDE=
    expiration-ms: 86400000

app:
  upload:
    dir: uploads
    max-file-size-bytes: 5242880
  demo:
    kolomna-seed-enabled: ${APP_DEMO_KOLOMNA_SEED_ENABLED:true}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  notifications:
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-chat-id: ${TELEGRAM_CHAT_ID:}
    email-from: ${NOTIFICATIONS_EMAIL_FROM:noreply@festival.local}

payments:
  yookassa:
    shop-id: ${YOOKASSA_SHOP_ID:1338545}
    secret-key: ${YOOKASSA_SECRET_KEY:test_60I1jqryWKjk6w9BAXPowiSEhWpM4h99D-TumQ9uCko}
    api-base-url: ${YOOKASSA_API_BASE_URL:https://api.yookassa.ru/v3}

yandex:
  metrika:
    enabled: ${YANDEX_METRIKA_ENABLED:false}
    token: ${YANDEX_METRIKA_TOKEN:}
    counter-id: ${YANDEX_METRIKA_COUNTER_ID:}
